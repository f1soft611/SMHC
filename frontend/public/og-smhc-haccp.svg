<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="ogTitle ogDesc">
  <title id="ogTitle">SMHC HACCP 운영 관리</title>
  <desc id="ogDesc">HACCP 점검과 문서 관리를 위한 소개 이미지입니다.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="70" x2="1080" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b6b6f" />
      <stop offset="1" stop-color="#07474a" />
    </linearGradient>
    <linearGradient id="panel" x1="260" y1="170" x2="930" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)" />
      <stop offset="1" stop-color="rgba(255,255,255,0.06)" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#062d2f" flood-opacity="0.24" />
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="#eef4f4" />
  <rect x="36" y="36" width="1128" height="558" rx="32" fill="url(#bg)" />

  <g opacity="0.18">
    <circle cx="1030" cy="96" r="132" fill="#6cb6d1" />
    <circle cx="1110" cy="548" r="174" fill="#f28f3b" />
    <circle cx="188" cy="554" r="146" fill="#3c9ca0" />
  </g>

  <g filter="url(#shadow)">
    <rect x="98" y="90" width="1004" height="450" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.18)" />
  </g>

  <g>
    <rect x="148" y="146" width="164" height="164" rx="36" fill="#ffffff" fill-opacity="0.12" stroke="rgba(255,255,255,0.22)" />
    <rect x="170" y="168" width="120" height="120" rx="28" fill="#ffffff" fill-opacity="0.1" />
    <text x="230" y="224" fill="#ffffff" font-family="Pretendard, Plus Jakarta Sans, Segoe UI, sans-serif" font-size="46" font-weight="800" text-anchor="middle" letter-spacing="1.5">SM</text>
    <text x="230" y="270" fill="#ffffff" font-family="Pretendard, Plus Jakarta Sans, Segoe UI, sans-serif" font-size="46" font-weight="800" text-anchor="middle" letter-spacing="1.5">HC</text>
    <rect x="190" y="232" width="80" height="6" rx="3" fill="#f28f3b" />
  </g>

  <g>
    <text x="360" y="176" fill="#d4ecec" font-family="Pretendard, Plus Jakarta Sans, Segoe UI, sans-serif" font-size="28" font-weight="700" letter-spacing="2.2">SMART HACCP CLOUD</text>
    <text x="148" y="388" fill="#ffffff" font-family="Pretendard, Plus Jakarta Sans, Segoe UI, sans-serif" font-size="72" font-weight="800" letter-spacing="-1.8">HACCP 운영 점검</text>
    <text x="148" y="466" fill="#ffffff" font-family="Pretendard, Plus Jakarta Sans, Segoe UI, sans-serif" font-size="72" font-weight="800" letter-spacing="-1.8">문서 관리 플랫폼</text>
    <text x="152" y="528" fill="#d8efef" font-family="Pretendard, Plus Jakarta Sans, Segoe UI, sans-serif" font-size="30" font-weight="500">점검, 기록, 템플릿을 한곳에서 관리합니다.</text>
  </g>

  <g>
    <rect x="846" y="146" width="180" height="56" rx="28" fill="#ffffff" fill-opacity="0.14" stroke="rgba(255,255,255,0.14)" />
    <circle cx="882" cy="174" r="10" fill="#f28f3b" />
    <text x="910" y="183" fill="#ffffff" font-family="Pretendard, Plus Jakarta Sans, Segoe UI, sans-serif" font-size="22" font-weight="700">CCP 점검</text>

    <rect x="846" y="224" width="208" height="56" rx="28" fill="#ffffff" fill-opacity="0.1" stroke="rgba(255,255,255,0.14)" />
    <circle cx="882" cy="252" r="10" fill="#6cb6d1" />
    <text x="910" y="261" fill="#ffffff" font-family="Pretendard, Plus Jakarta Sans, Segoe UI, sans-serif" font-size="22" font-weight="700">템플릿 관리</text>

    <rect x="846" y="302" width="214" height="56" rx="28" fill="#ffffff" fill-opacity="0.1" stroke="rgba(255,255,255,0.14)" />
    <circle cx="882" cy="330" r="10" fill="#8dd3ae" />
    <text x="910" y="339" fill="#ffffff" font-family="Pretendard, Plus Jakarta Sans, Segoe UI, sans-serif" font-size="22" font-weight="700">점검 이력</text>
  </g>
</svg>